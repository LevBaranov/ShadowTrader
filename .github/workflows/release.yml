name: Release Docker (GHCR)

on:
  release:
    types: [published]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract release version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV

      - name: Build and push Docker backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend.Dockerfile
          push: true
          tags: |
            ghcr.io/levbaranov/shadowtrader-back:${{ env.VERSION }}
            ghcr.io/levbaranov/shadowtrader-back:latest

      - name: Build and push Docker frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./frontend.Dockerfile
          target: prod
          push: true
          tags: |
            ghcr.io/levbaranov/shadowtrader-ui:${{ env.VERSION }}
            ghcr.io/levbaranov/shadowtrader-ui:latest
