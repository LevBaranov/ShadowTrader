services:
  db:
    image: postgres:18
    container_name: shadowtrader-postgres
    environment:
      POSTGRES_USER: postgres_user
      POSTGRES_PASSWORD: postgres_password
      POSTGRES_DB: postgres_db
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - 5432:5432
    volumes:
      - pgdata_prod:/var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres_user -d postgres_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  migrations:
    image: ghcr.io/levbaranov/shadowtrader:v0.4.0
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./prod.toml:/app/prod.toml
    env_file: .env
    command: alembic upgrade head

  app:
    image: ghcr.io/levbaranov/shadowtrader:v0.4.0
    container_name: shadowtrader-app
    depends_on:
      db:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    volumes:
      - ./prod.toml:/app/prod.toml
      - ./scheduler_results:/scheduler_results
      - ./logs:/src/bot/logs
    env_file: .env
    command: python src/main.py
    restart: unless-stopped

volumes:
  pgdata_prod:
    driver: local