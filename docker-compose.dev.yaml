services:
  db:
    image: postgres:18
    container_name: shadowtrader-postgres-dev
    environment:
      POSTGRES_USER: postgres_user
      POSTGRES_PASSWORD: postgres_password
      POSTGRES_DB: postgres_db
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - 54321:5432
    volumes:
      - pgdata:/var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres_user -d postgres_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  migrations:
    build:
      context: .
      dockerfile: backend.Dockerfile
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./dev.toml:/app/dev.toml
    env_file: .env-dev
    command: sh -c "alembic upgrade head"
#
#  app:
#    build: .
#    container_name: shadowtrader-app-dev
#    depends_on:
#      db:
#        condition: service_healthy
#      migrations:
#        condition: service_completed_successfully
#    volumes:
#      - ./logs:/app/src/bot/logs
#      - ./scheduler_results:/scheduler_results
#      - ./dev.toml:/app/dev.toml
#    env_file: .env-dev
#    command: python src/main.py
#    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: backend.Dockerfile
    container_name: shadowtrader-api-dev
    depends_on:
      db:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    volumes:
      - ./logs/api:/app/src/api/logs
      - ./scheduler_results:/scheduler_results
      - ./dev.toml:/app/dev.toml
    env_file: .env-dev
    ports:
      - 8000:8000
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped

  ui:
    build:
      context: .
      dockerfile: frontend.Dockerfile
      target: dev
    container_name: shadowtrader-ui-dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file: .env-dev
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - api
volumes:
  pgdata:
    driver: local